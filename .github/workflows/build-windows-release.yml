name: Build Windows EXE and Release

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows-release:
    name: Build Windows EXE and publish release
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Show tool versions
        shell: pwsh
        run: |
          rustc --version
          cargo --version

      - name: Build PixelmonFriendsClient.exe
        shell: pwsh
        run: .\scripts\build_windows.ps1

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: PixelmonFriendsClient-windows
          path: dist/PixelmonFriendsClient.exe
          if-no-files-found: error

      - name: Create release tag for branch or manual builds
        if: github.ref_type != 'tag'
        shell: pwsh
        run: |
          $tag = "client-${{ github.run_number }}-${{ github.run_attempt }}"
          "RELEASE_TAG=$tag" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a $tag -m "Pixelmon Friends Client $tag" $env:GITHUB_SHA
          git push origin $tag

      - name: Use pushed tag for tag builds
        if: github.ref_type == 'tag'
        shell: pwsh
        run: |
          "RELEASE_TAG=${{ github.ref_name }}" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Create or update GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = $env:RELEASE_TAG
          $asset = "dist\PixelmonFriendsClient.exe"
          $title = "Pixelmon Friends Client $tag"
          $notes = @"
          Automated Windows build.

          - Minecraft: 1.21.1
          - NeoForge: 21.1.219
          - Pixelmon: 9.3.16
          - Output: PixelmonFriendsClient.exe
          - Commit: $env:GITHUB_SHA
          "@

          if (gh release view $tag 2>$null) {
            gh release upload $tag $asset --clobber
          } else {
            gh release create $tag $asset --title $title --notes $notes --latest
          }
